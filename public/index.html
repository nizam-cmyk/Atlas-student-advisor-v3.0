<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#eef4f7" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>ATLAS Student Advisor</title>
  <style>
    :root{
      --bg1:#edf5f7;
      --bg2:#e8f0f4;
      --card:#ffffffcc;
      --line:#d9e5ea;
      --text:#243744;
      --muted:#607887;
      --accent:#7d6bff;
      --shadow:0 18px 50px rgba(79,108,128,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(142,197,214,.28), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(125,107,255,.10), transparent 24%),
        radial-gradient(circle at 75% 80%, rgba(148,194,203,.18), transparent 22%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:20px 12px 32px;
    }

    .app{
      width:min(860px, 100%);
    }

    .shell{
      background:var(--card);
      backdrop-filter:blur(12px);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px 18px 18px;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:12px;
      margin-bottom:20px;
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:20px;
      object-fit:cover;
      box-shadow:0 12px 30px rgba(125,107,255,.18);
      background:#f5f2ff;
    }

    h1{
      margin:0;
      font-size:clamp(32px, 6vw, 52px);
      line-height:1.05;
      letter-spacing:-0.03em;
      font-weight:700;
    }

    .subtitle{
      max-width:640px;
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .pill-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font:inherit;
      font-size:14px;
      cursor:pointer;
    }

    .chat{
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      border-radius:22px;
      min-height:220px;
      max-height:360px;
      overflow:auto;
      padding:14px;
      margin-bottom:16px;
    }

    .msg{
      padding:14px 16px;
      border-radius:18px;
      margin:10px 0;
      white-space:pre-wrap;
      line-height:1.55;
      font-size:15px;
    }

    .msg.bot{
      background:#f7fafb;
      border:1px solid #e1eaee;
    }

    .msg.you{
      background:#f3f0ff;
      border:1px solid #ddd6ff;
    }

    .label{
      display:block;
      font-size:12px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:6px;
      color:#6a7f8d;
    }

    .composer{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,.82);
    }

    textarea{
      width:100%;
      resize:none;
      border:0;
      outline:none;
      background:transparent;
      min-height:64px;
      max-height:180px;
      padding:4px 4px 0;
      color:var(--text);
      font:inherit;
      line-height:1.5;
    }

    textarea::placeholder{
      color:#89a0ad;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
    }

    .upload-btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:48px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      color:#4f6674;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      overflow:hidden;
      white-space:nowrap;
    }

    .upload-btn input[type=file]{
      position:absolute;
      inset:0;
      opacity:0;
      cursor:pointer;
    }

    .mic-btn{
      width:48px;
      height:48px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      color:var(--text);
      font-size:18px;
      cursor:pointer;
    }

    .mic-btn.listening{
      background:#efeaff;
      border-color:#b9a8ff;
    }

    .mic-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .send{
      width:48px;
      height:48px;
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg, var(--accent), #98c8d2);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(125,107,255,.22);
    }

    .send:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .hint{max-width:540px}
    .status{text-align:right}

    @media (max-width:700px){
      .shell{
        padding:20px 14px 16px;
        border-radius:24px;
      }

      .chat{
        min-height:180px;
        max-height:300px;
      }

      .controls{
        grid-template-columns:1fr 48px 48px;
      }

      .meta{
        flex-direction:column;
      }

      .status{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="hero">
        <img class="logo" src="/atlas-logo.png" alt="ATLAS logo" />
        <h1>Hello. I am ATLAS.</h1>
        <p class="subtitle">Your FEST student advisor.</p>

        <div class="top-actions">
          <button id="voiceToggle" type="button" class="pill-btn" aria-pressed="true">
            🔊 Voice greeting on
          </button>
          <button id="replyVoiceToggle" type="button" class="pill-btn" aria-pressed="false">
            🗣️ Reply voice off
          </button>
          <button id="installBtn" type="button" class="pill-btn" hidden>
            Install ATLAS
          </button>
        </div>
      </div>

      <div id="messages" class="chat">
        <div class="msg bot"><span class="label">ATLAS</span>How can I help you today?</div>
      </div>

      <div class="composer">
        <textarea id="message" placeholder="Ask a question or upload a form..."></textarea>

        <div class="controls">
          <label class="upload-btn" title="Upload form or document">
            <span>📎</span>
            <span>Upload form</span>
            <input id="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.txt,.json,.csv,.md" />
          </label>

          <button id="micBtn" class="mic-btn" type="button" aria-label="Use voice input">🎤</button>

          <button id="send" class="send" aria-label="Send">→</button>
        </div>
      </div>

      <div class="meta">
        <div id="voiceStatus" class="hint">Ask about your studies or get guidance on the courses to take this semester.</div>
        <div class="status">Session memory enabled</div>
      </div>
    </section>
  </main>

<script>
  async function sendMessage() {
    if (isSending) return;

    const text = message.value.trim();
    const f = file.files[0];
    if (!text && !f) return;

    isSending = true;
    send.disabled = true;

    let shown = '';
    if (text && f) {
      shown = `${text}\n\nUploaded file: ${f.name}`;
    } else if (f) {
      shown = `Uploaded file: ${f.name}`;
    } else {
      shown = text;
    }

    add('you', 'You', shown);

    let extractedFileText = '';
    let fileUpload = null;

    try {
      extractedFileText = await readTextLikeFile(f);
    } catch {}

    if (f) {
      try {
        fileUpload = {
          filename: f.name,
          type: f.type || null,
          size: f.size || null,
          base64: await fileToBase64(f)
        };
      } catch {}
    }

    const payload = {
      message: text,
      fileMeta: f ? { filename: f.name, type: f.type || null, size: f.size || null } : null,
      fileUpload,
      documentText: extractedFileText,
      sessionContext: getSessionContext()
    };

    message.value = '';
    file.value = '';
    autoResizeTextarea();

    const botNode = add('bot', 'ATLAS', 'Thinking...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (data && data.sessionContext) setSessionContext(data.sessionContext);

      const atlasReply = data?.reply || 'No response received.';
      botNode.innerHTML = `<span class="label">ATLAS</span>${escapeHtml(atlasReply)}`;
      speakReply(atlasReply);
    } catch (err) {
      const failReply = 'ATLAS could not reach the server. Please try again.';
      botNode.innerHTML = `<span class="label">ATLAS</span>${escapeHtml(failReply)}`;
      speakReply(failReply);
    } finally {
      isSending = false;
      send.disabled = false;
    }
  }
</script>
</body>
</html>
